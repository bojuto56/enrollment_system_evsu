{% extends 'base.html' %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="auth-box">
    <h1>Student Registration</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary full-width">Register</button>
    </form>
</div>
{% endblock %}
